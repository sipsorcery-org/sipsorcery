<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Max Headroom WebRTC Avatar</title>
    <style>
        body { font-family: sans-serif; background: #0a0a2a; color: #20c0e0; max-width: 700px; margin: 1em auto; }
        video { width: 640px; height: 480px; background: #000; display: block; }
        input[type=text] { width: 480px; padding: 6px; }
        button { padding: 6px 12px; }
        .row { margin: 8px 0; }
        label { display: inline-block; width: 70px; }
    </style>
</head>
<body>
    <h2>Max Headroom WebRTC Avatar</h2>

    <video controls autoplay playsinline id="videoCtl"></video>

    <div class="row">
        <input type="text" id="serverurl" />
        <button onclick="start();">Connect</button>
        <button onclick="closePeer();">Close</button>
    </div>

    <div class="row">
        <label>Mic:</label>
        <button id="micBtn" onclick="toggleMic();" disabled>Mute mic</button>
        <span id="micStatus">not connected &ndash; talk to Max once connected, or use Say/Ask below</span>
    </div>

    <div class="row">
        <label>Say:</label>
        <input type="text" id="sayText" placeholder="Type text to speak verbatim..." />
        <button onclick="post('/say', 'sayText');">Speak</button>
    </div>

    <div class="row">
        <label>Ask:</label>
        <input type="text" id="askText" placeholder="Ask the LLM something..." />
        <button onclick="post('/ask', 'askText');">Ask</button>
    </div>

    <script type="text/javascript">
        const STUN_URL = "stun:stun.cloudflare.com";
        const BASE_URL = "https://localhost:5443";
        var pc;
        var micStream;

        async function start() {
            pc = new RTCPeerConnection({ iceServers: [{ urls: STUN_URL }] });
            pc.ontrack = evt => document.querySelector('#videoCtl').srcObject = evt.streams[0];
            pc.oniceconnectionstatechange = () => console.log("ice: " + pc.iceConnectionState);
            pc.onconnectionstatechange = () => console.log("conn: " + pc.connectionState);

            // Capture the microphone and send it on a send/recv audio track so you can TALK to Max
            // (the server runs speech-to-text on it). Echo cancellation keeps the avatar's own voice
            // out of the mic, so it stays full duplex - you can talk over him. If the mic is denied or
            // unavailable, fall back to receive-only audio and use the Say/Ask boxes instead.
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
                pc.addTrack(micStream.getAudioTracks()[0], micStream);
                setMicStatus(true);
            } catch (err) {
                console.warn("Microphone unavailable:", err);
                pc.addTransceiver("audio", { direction: "recvonly" });
                document.querySelector('#micStatus').textContent = "mic unavailable (" + err.name + ") – use Say/Ask";
            }
            pc.addTransceiver("video", { direction: "recvonly" });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            const response = await fetch(document.querySelector('#serverurl').value + "/offer", {
                method: "POST",
                headers: { "Content-Type": "application/sdp" },
                body: pc.localDescription.sdp
            });

            if (!response.ok) { console.error("Offer failed:", response.status); return; }

            const sdpAnswer = await response.text();
            await pc.setRemoteDescription({ type: "answer", sdp: sdpAnswer });
        }

        async function post(path, inputId) {
            const text = document.querySelector('#' + inputId).value;
            if (!text) return;
            const resp = await fetch(document.querySelector('#serverurl').value + path, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: text
            });
            if (resp.ok) { console.log(await resp.text()); }
            else { console.error(path + " failed:", resp.status); }
        }

        function toggleMic() {
            const track = micStream && micStream.getAudioTracks()[0];
            if (!track) return;
            track.enabled = !track.enabled;
            setMicStatus(track.enabled);
        }

        function setMicStatus(on) {
            const btn = document.querySelector('#micBtn');
            btn.disabled = !(micStream && micStream.getAudioTracks().length);
            btn.textContent = on ? "Mute mic" : "Unmute mic";
            document.querySelector('#micStatus').textContent = on ? "listening – talk to Max" : "muted";
        }

        async function closePeer() {
            micStream?.getTracks().forEach(t => t.stop());
            micStream = null;
            await pc?.close();
            document.querySelector('#micBtn').disabled = true;
            document.querySelector('#micStatus').textContent = "not connected";
        }

        document.querySelector('#serverurl').value = BASE_URL;
    </script>
</body>
