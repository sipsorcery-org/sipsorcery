<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloudflare SFU Subscriber</title>
    <style>
        body { font-family: sans-serif; margin: 1rem; }
        button { margin-top: 0.8rem; margin-right: 0.6rem; }
        #status { margin-top: 0.8rem; white-space: pre-wrap; }
        #publisher { margin-top: 0.6rem; color: #444; }
        video { margin-top: 1rem; background: #000; }
    </style>
    <script type="text/javascript">
        let pc;
        let inboundStream;

        function setStatus(msg) {
            const el = document.querySelector("#status");
            el.textContent += `${msg}\n`;
            console.log(msg);
        }

        // The browser only ever talks to this app. The app holds the Cloudflare API token and
        // the publisher session id, and proxies the SFU calls, so neither is exposed here.
        async function api(path, body) {
            const init = { method: "POST" };
            if (body !== undefined) {
                init.headers = { "Content-Type": "application/json" };
                init.body = JSON.stringify(body);
            }
            const response = await fetch(path, init);
            const text = await response.text();
            if (!response.ok) {
                throw new Error(`${path} -> HTTP ${response.status}: ${text}`);
            }
            return text ? JSON.parse(text) : {};
        }

        async function refreshPublisher() {
            try {
                const r = await fetch("/api/publisher");
                const info = await r.json();
                document.querySelector("#publisher").textContent =
                    info.sessionId
                        ? `Publisher session: ${info.sessionId} (audio: ${info.audioTrackName}, video: ${info.videoTrackName})`
                        : "Publisher is not ready yet.";
            } catch (err) {
                document.querySelector("#publisher").textContent = `Could not load publisher info: ${err?.message || err}`;
            }
        }

        async function start() {
            try {
                document.querySelector("#status").textContent = "";

                pc = new RTCPeerConnection({
                    iceServers: [{ urls: "stun:stun.cloudflare.com" }]
                });

                inboundStream = new MediaStream();
                document.querySelector("#videoCtl").srcObject = inboundStream;

                pc.ontrack = (evt) => {
                    setStatus(`Received ${evt.track.kind} track.`);
                    inboundStream.addTrack(evt.track);
                };

                pc.oniceconnectionstatechange = () => setStatus(`ICE state: ${pc.iceConnectionState}`);
                pc.onconnectionstatechange = () => setStatus(`PC state: ${pc.connectionState}`);

                // Ask the app to create a subscriber session and pull the publisher's tracks.
                // Cloudflare returns an offer for pulled tracks, which we answer below.
                const sub = await api("/api/subscribe");
                if (!sub.sdp) {
                    throw new Error(`No offer SDP returned: ${JSON.stringify(sub)}`);
                }
                setStatus(`Subscriber session: ${sub.subscriberSessionId}`);

                await pc.setRemoteDescription({ type: "offer", sdp: sub.sdp });

                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                await api("/api/renegotiate", {
                    subscriberSessionId: sub.subscriberSessionId,
                    sdp: pc.localDescription.sdp
                });

                setStatus("Subscription established.");
            } catch (err) {
                setStatus(`Start failed: ${err?.message || err}`);
            }
        }

        async function closePeer() {
            try {
                if (pc) {
                    pc.close();
                    pc = null;
                }
                setStatus("Closed.");
            } catch (err) {
                setStatus(`Close failed: ${err?.message || err}`);
            }
        }

        window.addEventListener("load", refreshPublisher);
    </script>
</head>
<body>
    <h2>Cloudflare Realtime SFU Subscriber</h2>

    <div id="publisher">Loading publisher info...</div>

    <div>
        <button type="button" onclick="start();">Subscribe</button>
        <button type="button" onclick="closePeer();">Close</button>
    </div>

    <div id="status"></div>
    <video id="videoCtl" autoplay playsinline controls></video>
</body>
</html>
