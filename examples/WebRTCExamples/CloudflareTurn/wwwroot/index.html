<!DOCTYPE html>
<head>
    <script type="text/javascript">
        const ICE_SERVERS_API_URL = "/api/cloudflare/iceservers"
        const WEBRTC_OFFER_API_URL = "/api/webrtc/offer"

        var pc;

        function waitForIceGatheringComplete(peerConnection) {
            if (peerConnection.iceGatheringState === "complete") {
                return Promise.resolve();
            }

            return new Promise(resolve => {
                const checkState = () => {
                    if (peerConnection.iceGatheringState === "complete") {
                        peerConnection.removeEventListener("icegatheringstatechange", checkState);
                        resolve();
                    }
                };

                peerConnection.addEventListener("icegatheringstatechange", checkState);
            });
        }

        async function start() {
            const iceServersResponse = await fetch(ICE_SERVERS_API_URL);
            if (!iceServersResponse.ok) {
                throw new Error(`Failed to get ICE servers (${iceServersResponse.status}).`);
            }

            const data = await iceServersResponse.json();

            console.log(data);

            pc = new RTCPeerConnection({
                iceServers: data.iceServers,
                iceTransportPolicy: "relay" // Want to test TURN servers, so tell the browser to only use relay candidates.
            });

            //pc = new RTCPeerConnection();

            pc.ontrack = evt => {
				console.log("Adding track to video control.");
				document.querySelector('#videoCtl').srcObject = evt.streams[0];
				
				evt.streams[0].onunmute = () => {
					console.log("Adding track to video control.");
				};
                    
			   evt.streams[0].onended = () => {
				  console.log("Track ended.");
			   };
			}

            pc.oniceconnectionstatechange = () => {
                console.log("ICE connection state change: ", pc.iceConnectionState);
            };

            pc.onconnectionstatechange = () => {
                console.log("Connection state change: ", pc.connectionState);
            };

            //pc.onicecandidate = evt => evt.candidate && ws.send(JSON.stringify(evt.candidate));
            pc.onicecandidate = evt => console.log("New ICE candidate: ", evt.candidate);

			pc.onclose= () => {
			   console.log("pc close");
			};

            pc.addTransceiver("audio", { direction: "recvonly" });
            pc.addTransceiver("video", { direction: "recvonly" });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // This example does not trickle ICE candidates, so wait for ICE gathering to complete
            // before posting the offer. Otherwise the offer SDP would not include the browser's
            // candidates and the connection could never establish.
            await waitForIceGatheringComplete(pc);

            const offerResponse = await fetch(WEBRTC_OFFER_API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/sdp" },
                body: pc.localDescription.sdp
            });

            if (!offerResponse.ok) {
                throw new Error(`Failed to post WebRTC offer (${offerResponse.status}).`);
            }

            const answerSdp = await offerResponse.text();
            //console.log(answerSdp);
            console.log("Answer SDP received, setting remote description...");
            await pc.setRemoteDescription({ type: "answer", sdp: answerSdp });
        };

        async function closePeer() {
            await pc?.close();
        };

    </script>
</head>
<body>

    <video controls autoplay="autoplay" id="videoCtl" width="640" height="480"></video>

    <div>
        <button type="button" class="btn btn-success" onclick="start();">Start</button>
        <button type="button" class="btn btn-success" onclick="closePeer();">Close</button>
    </div>

</body>
